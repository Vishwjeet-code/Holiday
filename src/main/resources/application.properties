spring.application.name=Global-Holiday
server.address=0.0.0.0
server.port=8080



spring.datasource.jdbc-url=jdbc:postgresql://localhost:5432/enkreate
spring.datasource.username=postgres
spring.datasource.password=localhost


spring.secondary.datasource.jdbc-url=jdbc:postgresql://localhost:5432/holiday_db
spring.secondary.datasource.username=postgres
spring.secondary.datasource.password=localhost

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.ddl-auto=none
## spring.sql.init.mode=always
hibernate.order_by_default=true
## spring.jpa.defer-datasource-initialization=true

